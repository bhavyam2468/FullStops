    /* ─── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after {

      right: 0;

      z-index: 50;

      top: 0;

        var(--bg) 0%,
        transparent 100%

    }

# Prelude

Cramps happen because prostaglandins, which are chemicals that tell the uterus to contract and shed its lining, get released. In some people they’re released in higher amounts, and more prostaglandins usually means stronger contractions. 

To begin with it: Periods or menstrual cycle is each month a female body going into a prepration for holding a fertilized egg to develop it into a human but failing to do so because lack of reproduction so just shedding out all the prepration... In the form of blood. 

# The "Follicular"

The period(umbrella for menstruation) itself is a highly inflammatory event; it requires inflammation to shed the lining. Once the bleeding period stops, the Follicular Phase acts as a massive biological cooldown. Due to estrogen, a hormone,  the body returns to the baseline. The immune system shifts entirely out of "attack" mode and redirects all its resources into "tissue repair" mode.

In the follicular phase, the uterus has a lining (uterine lining or endometrium) which thickens over time, it basically thickens adding nutrient rich blood and stuff for the expected fertilized egg, to support the potential embryo. it happens because of one of the two reproductive hormones in females: estrogen, which makes ovaries build follicles(sacs for containing eggs) and uterus build the lining. The follicular phase begins right around day 6 of the cycle. 

The lining is divided into two distinct layers. The bottom layer is the stratum basalis (the foundation). This layer never leaves the body; it survives the period and acts as the permanent blueprint. When the period ends, the uterus is basically a raw, open wound. As the dominant follicle in the ovary starts pumping out Estrogen, that Estrogen travels through the blood and hits the receptors in this foundation layer, acting as a powerful mitogen... a chemical that forces cells to divide rapidly. Estrogen’s only command right now is proliferation. It tells the foundation to frantically build a brand new upper layer, called the stratum functionalis, from scratch. 

​As this new tissue stacks up, going from about 1 millimeter thick to around half a centimeter, it has to build its internals. The first piece of this is the glandular system. The uterine glands are essentially microscopic tubes designed to eventually hold nutrients for an embryo. Under the influence of Estrogen, these glands multiply and grow rapidly. However, they are completely empty right now, the nutrients and blood they get filled with, comes later. So far, they grow as straight, narrow, unbranched tubes.

To keep the rapidly multiplying tissue (endometrium) alive, it needs a massive blood supply. the body grows arteries (spiral arteries) in a tightly coiled, spring-like shape. As the endometrium thickens day by day, these spiral arteries uncoil and stretch upward, weaving through the newly built glands to supply oxygen to the growing cells.

This whole lining is stimulated because of the presence and push of estrogen, one of the two reproductive hormone, which is responsible for a lot. Estrogen is released by egg containing follicles which do so when they are stimulated by a hormone named FSH (follicle stimulating hormone, literally) which is released by pituitary. Follicles slowly develop for around 3-4 months before entering their period saga... and every follicular, 1 out of 20ish follicles is chosen and releases the egg for ovulation.

# Physical Experiences In Follicular

Keeping away the biology, sometimes women experience ovulation pain, which is basically the follicle swelling big enough to stretch the surface of an ovary, and its rupture could be explosive and release blood/follicular fluid which can irritate the abdominal lining.

The physical experience is usually a sharp, one sided cramp in lower hip region, the interesting part is that it actually tells the person experiencing it exactly which ovary released the egg that month. Its called mittelschmerz. A lot of women can physically feel this as a localized, heavy pressure, a dull throbbing, or a sharp pinch on either the lower left or lower right side of their pelvis. It’s the feeling of a biological balloon inflating right to the edge of its breaking point.

Other parts of the follicular arent actually that noticable, like the endometrium happens in complete stealth mode. The uterus is an incredibly strong muscle, but the internal lining itself doesn't have the kind of somatic nerve endings that register "growth" or "tickling." You can't feel cells dividing. Because Estrogen is building a dry, structural scaffold without waterlogging the tissue, it doesn't trigger the stretch receptors in the uterine wall. So the actual thickening goes completely unnoticed by the brain. The only vague sensation someone might experience from the uterus during this time is a subtle feeling of increased blood flow to the pelvic floor, which can feel like a localized warmth or "vitality," but it rarely registers as a distinct physical event.

The cervix, however, is a different story. The cervix is packed with nerve endings, and its movement during the late follicular phase changes the internal geometry of the vagina. As Estrogen peaks, the ligaments supporting the uterus literally pull the cervix higher up into the body, out of the way. While a woman won't feel the cervix "traveling," she might notice the architectural shift during sex or if she uses menstrual cups or tampons (if she were spotting),  the vaginal canal physically feels deeper or more hollow. As for the dilation (cervical opening) it only opens by a millimeter or two to let sperm in. It’s not like the massive, painful dilation of childbirth. It is entirely smooth and painless.

Apparantly, the most undeniable physical sensation of this entire phase isn't the tissue growing or the cervix moving, it’s the sudden gravity of the fluid. As the cervix ramps up production of that 98%-water, egg-white mucus, it eventually flows down the vaginal canal. Most women feel this. It often presents as a sudden, unmistakable "gush" or a slippery, bubbling sensation at the vulva. It is so distinct that it frequently causes a moment of panic where they could think, "Did my period just start early?" only to go to the bathroom and realize it’s just peak fertile mucus. It acts as a constant, physical, damp reminder that Estrogen is maxed out.

If there is any actual discomfort or pressure during the follicular buildup, it almost never comes from the uterus. It comes from the ovaries, which i already mention, mittelschmerz.

As suggested by the name, exitatory chemicals or hormones increase the electrical likelyhood that a neuron will fire, basically most of these hormones also act as neurotransmitters. A neuron, is slightly negatively charged as compared to the fluid outside of it, it has a resting voltage (~ -70mV), when an exitatory neurotransmitter crosses the synapse (gap between neurons) it lands on the surfaces of the recieving neuron, binding itself with it, theres a microscopic pore in the cell wall of a neuron, the binding of exitatory trasmitter pops that pore open to let positively charged Na+ ions floating around to rush inside the cell and because you are adding positive charge to a negative space, the inside of the neuron starts to become less negative. The voltage climbs from -70mV up to -65mV, -60mV, and so on. This shift toward a positive charge is called depolarization. Once it hits a critical voltage (~ -55mV) the neuron essentially pulls the trigger. It triggers an action potential a massive, rapid electrical spike that shoots all the way down the length of the neuron to release its own neurotransmitters onto the next cell, causing a chain reaction. The inhibitory neruotransmitter on the other hand, does almost the same except essentially it lets in Cl- ions inside and the negative voltage increases which makes it hardeer for the neuron to fire.

The GABA-A receptor isn't just one thing.

For most people, Allopregnanolone binding to GABA-A receptors does produce calm. But in people with anxiety disorders, particularly those with a history of trauma, PTSD, or certain genetic variants, the GABA-A receptor has actually adapted to chronic anxiety. The receptor's subunit composition physically changes over time in anxious brains. It rewires itself.

So when Allopregnanolone floods these already adapted receptors, instead of producing sedation and calm, it produces a paradoxical excitatory response. The brake becomes a gas pedal. This is actually the same reason some people get more anxious on Xanax or feel weird on alcohol instead of relaxed  same mechanism, same receptor, different hardware.

# Corpus Luteum is Dead: PMS

Day 28
Or Day 1.

Remember that for the last three weeks, the brain has been bathing in a warm, protective chemical soup. It adapted to the high voltage clarity of Estrogen and the heavy, sedating blanket of Progesterone. The brain essentially built its entire reality around the presence of these hormones.

On day 28, as the corpus luteum dies, everything abruptly comes to a halt. The production of these hormones falls off an absolute cliff. The brain goes into immediate, violent chemical withdrawal. 

The withdrawal of dopamine should feel like losing the motivation to do anything
The withdrawal of oxytocin should feel like being deprived of love, feeling unlikeable, isolated, lonely... so much so that asking help could feel like overreaching.
The withdrawal of progesterone should feel like getting exposed, every raw nerve bare naked in cold
The withdrawal of estrogen should feel like losing the will to do anything, losing the energy to carry off with talking, losing social energy
The withdrawal of seretonin alongwith estrogen (PMS) should feel like losing bodily safety and general comfort.

The withdrawal of everything altogether, should essentially feel like hell. And to some it does. Sometimes it does.
To some, or sometimes, it feels casual, expected.
But biologically, the central nervous system is left exposed and hyper sensitive to ANY stimulus.
So much so as a spoon falling could make a woman cry.

​Premenstrual Syndrome (PMS) is not an excuse for a bad mood or a lack of emotional stability. Its a state of physiological vulnerability. Because Estrogen and Serotonin are inextricably linked, the sudden death of Estrogen drags the brain’s Serotonin levels down into the dark with it. The "happy" chemical, the molecule that provides contentment and emotional resilience, simply evaporates. At the exact same time, the drop in Progesterone starves the brain's GABA receptors, the exact receptors that usually keep anxiety in check. The brain completely loses its biological shock absorbers. A minor inconvenience that would normally bounce right off... a spilled cup of coffee, a slightly delayed text, a weird tone of voice, suddenly feels like a catastrophic emotional injury. The crying spells and the sudden flashes of intense irritability aren't overreactions; they are the desperate flailing of a nervous system that is trying to process reality without the chemicals it needs to feel safe

About 5-10% women experience PMDD. Premenstrual Dysphoric Disorder. 

Described as "An allergic reaction to being alive". In PMDD, the hormonal drop is the same, but the brain’s hardware is fundamentally, tragically hypersensitive to the shift. The crash doesn't just cause sadness; it causes absolute, crushing dysphoria. The brain actively turns against the host. It strips away all self-worth, replacing it with a profound, suffocating darkness. Women with PMDD report sudden, intense suicidal ideation, paralyzing panic attacks, and the terrifying sensation that they are entirely fundamentally broken. It is of course, completely out of their control, where they become trapped in a mind that is actively lying to them, telling them that nobody loves them, that their relationships are doomed, and that they are a burden. 

And adding self awarness to it. Something that people use to call women out "you know its going to happen", "it happens every month", "youre aware"

"If you are so aware, just ignore it, why cry"

Apparantly, to a person experiencing PMS or PMDD, lying in bed feeling an existential dread so heavy it physically aches in their chest, since a part of them logically knows why it is happening. They know they are just days away from bleeding. They know that the moment the period starts and the Estrogen slowly begins to rise again, this fog will instantly lift like a fever breaking. But that logic does absolutely nothing to stop the bleeding of the mind in the present moment. Self-awareness does not synthesize Serotonin. Knowing you are biologically compromised doesn't make the weight of the sadness feel any less real or any less permanent while you are drowning in it. It is the ultimate loss of control over your own reality, a forced surrender to a chemical tide that you just have to survive until the machinery finally resets itself.

The vascular supply of the upper endometrium (stratum functionalis) relies on spiral arteries. Their coiled structure allows them to stretch and accommodate the rapid thickening of the endometrium during the cycle without breaking.
​
During the luteal phase, a process named decidualization heavily alters the extracellular matrix surrounding these arteries. Progesterone acts as a continuous vasodilator, relaxing the smooth muscle cells in the arterial walls to maintain a high volume of blood flow to the newly formed decidual tissue. Consequently, the spiral arteries become highly dependent on circulating progesterone to maintain their dilated state

Without progestrone, those aforementioned spiral arteries go into violent spasms. They physically constrict and twist shut. This triggers a state of localized hypoxia, or ischemia, meaning the blood supply to the upper layer of the uterus (the stratum functionalis) is entirely cut off. The cells that spent weeks multiplying and filling with heavy, nutrient-dense fluid are suddenly suffocated. They begin to rapidly die and break apart. The body realizes that everything it built in the past three weeks is useless, dying tissue sitting inside a vital organ. It has to be evicted immediately

As the ischemia sets in, millions of cells begin to undergo necrosis (uncontrolled tissue death). As these cells suffocate and rupture, their outer membranes which are made of lipids (fats) break apart.

# The Physical Experience and its "Why"

Cramps range from “barely noticeable” to “I can’t stand up straight.” Both ends can be normal. Cramps happen because prostaglandins, which are chemicals that tell the uterus to contract and shed its lining, get released. An enzyme named COX takes dead and rupturing cells and tissues in the uterus, and converts them into prostaglandin. Which acts as a chemical binding to the outer uterine wall which causes contractions... cramps. In some people they’re naturally released in higher amounts, and more prostaglandins usually means stronger contractions. 

If the uterus just ripped off a massive layer of tissue and let it bleed, the blood would immediately coagulate and form a massive, solid scab inside the organ. A solid mass cannot pass through the tiny, millimeter-wide opening of the cervix. To solve this, the uterus releases a specialized enzyme called plasmin. Plasmin is a highly aggressive biological blood thinner. Its entire job is to chemically slice through the fibrin proteins that cause blood to clot. As the dead tissue and blood pool in the uterus, the plasmin dissolves it into a thick, flowable liquid so it can safely drain out of the body. When a person passes a visible "clot" during a heavy period, it is not actually a true blood clot; it is a chunk of the endometrial tissue itself, or it simply means the sheer volume of the shedding lining is temporarily outpacing the body's ability to produce enough plasmin to melt it down.

By contracting violently, the uterine muscle physically pinches those severed vessels shut. The blinding pain of a severe cramp is the feeling of an organ squeezing itself so hard that it temporarily cuts off its own blood supply, purely to stop the host from bleeding to death.

But for some reason... prostaglandins are sloppy. They are incredibly potent, locally acting hormones, but because the uterus is producing such a massive quantity of them to clear out the lining, they inevitably leak into the general bloodstream. Once they are in the blood, they cause systemic chaos.<<

A period that arrives after a particularly stressful exam season, or after a month of poor sleep and worse diet, will almost always be harder than baseline. Heavier, longer, more painful, more emotionally volatile. Not because something is wrong. Because the body is shedding a lining that was built under suboptimal hormonal conditions, and clearing out a system that was running on cortisol and caffeine for weeks.

And conversely, a period that arrives after a good month, consistent sleep, decent food, low stress, is often noticeably easier. This is why the experience of periods can feel so inconsistent and random. It's not random. It's just that the cause is weeks in the past, so the connection isn't obvious.

# Conditions 

There's this condition called PCOS (Polycystic ovarian syndrome), which fundamentally just causes more LH then FSH, but it further leads to the production of androgens (testosterone like hormone) which have chronic effects on the body like irregular periods, facial/bodily hair growth, acne that doesnt leave, weight gain and even fertility issues. Theres misinfo about its diagnosis too... PCOS does not require cysts on the ovaries to be diagnosed. It doesn't require all three classic symptoms. Two out of three irregular ovulation, elevated androgens, or polycystic-looking ovaries on ultrasound is enough. 

There's also endometriosis. Ive already mentioned this once, but it needs attention. Alot of the times as the uterus sheds the lining, a certain part of the blood or tissues backfire. Mostly the immune system notices it and destroys the displaced tissue. In endometriosis, thats not the case. There are other possible causes, but generally, the tissue sticks to any part, the fallopian tube, the ovaries, even external parts like the bladder. That tissue then every month behaves like endometrium, it thickens, and bleeds. It can also irritate the surroundings causing scar tissues around. And its pain is distinct from cramps. extreme pelvic pain, pain during sex, pain passing bowels or urinating in periods, and in some cases, infertility.

Still, some people with endometriosis have no symptoms. Often, they find out they have the condition when they can't get pregnant or after they get surgery for another reason.

Oligomenorrhea is the clinical term for infrequent periods specifically, cycles that are consistently longer than 35 days, or fewer than 9 periods in a calendar year. It's not absence. The machinery is still running. It's just running slowly, inefficiently, or incompletely.
The distinction between a naturally long cycle and oligomenorrhea is consistency and pattern. A single 40 day cycle after a stressful month is normal variation. Cycles that are consistently 45, 50, 60 days long, month after month, is oligomenorrhea.
And another named amenorrhea (complete abscense of periods...)
Two types:
Primary Amenorrhea
Primary amenorrhea is when menstruation has never occurred by age 15 in someone who has otherwise begun puberty, or by age 13 if no signs of puberty have appeared at all.
Secondary Amenorrhea is when someone who previously had regular periods stops menstruating for three or more consecutive months, or six months if their cycles were already irregular.
This is far more common than primary amenorrhea and the causes are just anything causing variations in periods pushed to its extreme.

The thing that affects periods the most is vasoconstriction.

The fundamental cause of primary menstrual pain is the spiral arteries clamping shut, cutting off oxygen to the uterus. Any external substance that acts as a vasoconstrictor meaning it artificially shrinks blood vessels throughout the entire body will OBJECTIVELY multiply ischemic pain.

Contenders contributing alot to it: Smoking, stress, alcohol, sleep, hydration etc

Statistically, smokers experience significantly higher rates of severe cramps simply because they are chemically inducing a more severe state of hypoxia in their own pelvic tissue. Smoking is probably the single most studied lifestyle variable in relation to menstrual pain, and it makes things worse very significantly, and it does it through multiple simultaneous pathways. 

One of which is cortisol. "Smoking releases cortisol leading to low brain fog", this is partially true
Smoking does release cortisol, and that increases concentration yes, but brain soon builds up tolerance and once tolerance is built, the "high concentration" state of a smoker is practically equal to the stable state of a non smoker, and the stable state of the non smoker has increased brainfog.

And cortisol..., 
It increases vaso constriction, it lowers pain tolerance, it increases prostaglanding production and we hate overproduction of prostaglandin. It increases muscle tension, and the biggest "cortisol steal"

There's also a hormonal layer. The toxins in cigarette smoke disrupt estrogen metabolism in the liver. Estrogen is processed and cleared by the liver, and smoking impairs that clearance, leading to lower circulating estrogen levels over time.

Magnesium.
Basically, any kind of muscle contractions are governed by the cellular exchange of calcium and magnesium. Calcium enters a muscle cell to trigger contraction, and magnesium enters to push it out. So increasing magnesium calms cramps, in simple terms. Magnesium also downregulates COX enzyme which produces the sloppy chemical, prostaglandin. It also acts as a cofactor in synthesis of seretonin and dopamine. calcium is still required for the muscle to function properly. A severe calcium deficiency actually increases muscle cramping and nerve irritability. Vitamin D helps it, and vitamin D receptors are also present throughout the reproductive tract and adequate levels correlate with a reduction in severity of PMS and PMDD.

Iron is the core component of hemoglobin, the protein in red blood cells responsible for carrying oxygen to tissues. During menstruation, the physical shedding of the endometrial lining results in a direct loss of whole blood. If the volume of blood lost exceeds the body's iron reserves, the bone marrow cannot synthesize new red blood cells fast enough.
This creates a state of systemic mild hypoxia (low oxygen). Because the brain and muscles are operating on a marginal oxygen deficit, the physical result is acute lethargy, brain fog, lightheadedness upon standing, and general physical exhaustion.

<script>
  (() => {
    'use strict';

    // ── Elements ───────────────────────────────────────────────
    const rawEl      = document.getElementById('raw-content');
    const reader     = document.getElementById('reader');
    const progressEl = document.getElementById('progress-bar');
    const btnTheme   = document.getElementById('btn-theme');
    const btnCollapse= document.getElementById('btn-collapse');
    const iconMoon   = document.getElementById('icon-moon');
    const iconSun    = document.getElementById('icon-sun');
    const html       = document.documentElement;

    // ── State ──────────────────────────────────────────────────
    let collapseMode   = false;
    let isDark         = true;
    let scrollTarget   = window.scrollY;
    let currentScroll  = window.scrollY;
    let rafId          = null;
    let lastWheelTime  = 0;
    let velocity       = 0;

    // ── Parse & Render Content ─────────────────────────────────
    function parseContent(raw) {
      const lines = raw
      .replace(/\r\n/g, '\n')
      .replace(/\r/g, '\n')
      .trim()
      .split('\n');
      const sections = [];
      let intro = [];
      let current = null;

      lines.forEach(line => {
        const headingMatch = line.match(/^\s*#\s+(.+)$/);
        if (headingMatch) {
          if (current) sections.push(current);
          else if (intro.length) {
            sections.push({ type: 'intro', paragraphs: groupParagraphs(intro) });
            intro = [];
          }
          current = { type: 'section', heading: headingMatch[1], lines: [] };
        } else {
          if (current) current.lines.push(line);
          else intro.push(line);
        }
      });

      if (current) sections.push(current);
      else if (intro.length) sections.push({ type: 'intro', paragraphs: groupParagraphs(intro) });

      if (current) {
        const last = sections[sections.length - 1];
        if (last.type === 'section') {
          last.paragraphs = groupParagraphs(last.lines);
        }
      }

      // process paragraphs for each section
      sections.forEach(s => {
        if (s.type === 'section') {
          s.paragraphs = groupParagraphs(s.lines);
        }
      });

      return sections;
    }

    function groupParagraphs(lines) {
      const paras = [];
      let current = [];
      lines.forEach(line => {
        if (line.trim() === '') {
          if (current.length) { paras.push(current.join(' ')); current = []; }
        } else {
          current.push(line.trim());
        }
      });
      if (current.length) paras.push(current.join(' '));
      return paras;
    }

    function renderContent() {
      const raw = rawEl.textContent;
      const sections = parseContent(raw);
      reader.innerHTML = '';

      sections.forEach((sec, i) => {
        if (sec.type === 'intro') {
          const div = document.createElement('div');
          div.className = 'intro-block';
          sec.paragraphs.forEach(p => {
            const el = document.createElement('p');
            el.textContent = p;
            div.appendChild(el);
          });
          reader.appendChild(div);
          return;
        }

        // Section
        const secEl = document.createElement('div');
        secEl.className = 'section';
        secEl.dataset.index = i;

        const headingEl = document.createElement('h2');
        headingEl.className = 'section-heading';
        headingEl.innerHTML = `${sec.heading}<span class="collapse-arrow">▶</span>`;

        const bodyEl = document.createElement('div');
        bodyEl.className = 'section-body';
        // set explicit height for animation baseline
        sec.paragraphs.forEach(p => {
          const el = document.createElement('p');
          el.textContent = p;
          bodyEl.appendChild(el);
        });

        headingEl.addEventListener('click', () => {
          if (!collapseMode) return;
          toggleSection(headingEl, bodyEl);
        });

        secEl.appendChild(headingEl);
        secEl.appendChild(bodyEl);
        reader.appendChild(secEl);
      });
    }

    // ── Section Toggle ─────────────────────────────────────────
    function getExpandedHeight(el) {
      // Temporarily make visible to measure
      const prev = el.style.cssText;
      el.style.cssText = 'position:absolute;visibility:hidden;height:auto;overflow:hidden;';
      const h = el.scrollHeight;
      el.style.cssText = prev;
      return h;
    }

    function toggleSection(headingEl, bodyEl, forceState) {
      // forceState: 'open' | 'closed' | undefined (toggle)
      const isCollapsed = headingEl.classList.contains('collapsed');
      const shouldOpen = forceState === 'open' ? true
                       : forceState === 'closed' ? false
                       : isCollapsed;

      bodyEl.classList.add('animating');

      if (shouldOpen) {
        // Expand
        headingEl.classList.remove('collapsed');
        const targetH = getExpandedHeight(bodyEl);
        bodyEl.style.height = '0px';
        bodyEl.style.opacity = '0';
        bodyEl.classList.remove('collapsed');
        // Force reflow
        void bodyEl.offsetHeight;
        bodyEl.style.height = targetH + 'px';
        bodyEl.style.opacity = '1';

        bodyEl.addEventListener('transitionend', function onEnd(e) {
          if (e.propertyName !== 'height') return;
          bodyEl.style.height = 'auto';
          bodyEl.classList.remove('animating');
          bodyEl.removeEventListener('transitionend', onEnd);
        });

      } else {
        // Collapse
        headingEl.classList.add('collapsed');
        const currentH = bodyEl.scrollHeight;
        bodyEl.style.height = currentH + 'px';
        bodyEl.style.opacity = '1';
        void bodyEl.offsetHeight;
        bodyEl.style.height = '0px';
        bodyEl.style.opacity = '0';

        bodyEl.addEventListener('transitionend', function onEnd(e) {
          if (e.propertyName !== 'height') return;
          bodyEl.classList.add('collapsed');
          bodyEl.classList.remove('animating');
          bodyEl.removeEventListener('transitionend', onEnd);
        });
      }
    }

    // ── Collapse Mode Toggle ───────────────────────────────────
    function toggleCollapseMode() {
      collapseMode = !collapseMode;
      document.body.classList.toggle('collapse-mode', collapseMode);

      const headings = document.querySelectorAll('.section-heading');
      const bodies   = document.querySelectorAll('.section-body');

      if (collapseMode) {
        // Collapse all with stagger
        headings.forEach((h, i) => {
          const b = bodies[i];
          if (!b) return;
          setTimeout(() => toggleSection(h, b, 'closed'), i * 60);
        });
      } else {
        // Expand all with stagger
        headings.forEach((h, i) => {
          const b = bodies[i];
          if (!b) return;
          setTimeout(() => toggleSection(h, b, 'open'), i * 60);
        });
      }
    }

    // ── Theme Toggle ───────────────────────────────────────────
    function toggleTheme() {
      isDark = !isDark;
      html.setAttribute('data-theme', isDark ? 'dark' : 'light');
      iconMoon.style.display = isDark ? '' : 'none';
      iconSun.style.display  = isDark ? 'none' : '';
    }

    // ── Smooth Scroll Physics ──────────────────────────────────
    // Intercept wheel events and apply eased momentum
    const FRICTION    = 0.88;   // velocity multiplier per frame
    const WHEEL_MULT  = 1.0;    // wheel delta multiplier
    const SNAP_THRESH = 0.3;    // px/frame to stop animation

    function smoothScrollLoop() {
      const diff = scrollTarget - currentScroll;
      const step = diff * 0.1;

      if (Math.abs(step) < SNAP_THRESH && Math.abs(velocity) < SNAP_THRESH) {
        currentScroll = scrollTarget;
        window.scrollTo(0, currentScroll);
        rafId = null;
        return;
      }

      currentScroll += step;
      velocity *= FRICTION;
      window.scrollTo(0, currentScroll);
      rafId = requestAnimationFrame(smoothScrollLoop);
    }

    function onWheel(e) {
      e.preventDefault();
      const delta = e.deltaY * WHEEL_MULT;
      scrollTarget += delta;
      scrollTarget = Math.max(0, Math.min(scrollTarget, document.body.scrollHeight - window.innerHeight));
      if (!rafId) rafId = requestAnimationFrame(smoothScrollLoop);
    }

    window.addEventListener('wheel', onWheel, { passive: false });

    // ── Progress Bar & LocalStorage ────────────────────────────
    const STORAGE_KEY = 'blog_scroll_pos';

    function updateProgress() {
      const total = document.body.scrollHeight - window.innerHeight;
      const pct   = total > 0 ? (window.scrollY / total) * 100 : 0;
      progressEl.style.width = pct.toFixed(2) + '%';
    }

    function saveScroll() {
      localStorage.setItem(STORAGE_KEY, Math.round(window.scrollY));
    }

    function restoreScroll() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const pos = parseInt(saved, 10);
        window.scrollTo(0, pos);
        currentScroll = pos;
        scrollTarget  = pos;
      }
    }

    window.addEventListener('scroll', () => {
      updateProgress();
      saveScroll();
    }, { passive: true });

    // ── Button Listeners ───────────────────────────────────────
    btnTheme.addEventListener('click', toggleTheme);
    btnCollapse.addEventListener('click', toggleCollapseMode);

    // ── Init ───────────────────────────────────────────────────
    renderContent();
    restoreScroll();
    updateProgress();

  })();
</script>
